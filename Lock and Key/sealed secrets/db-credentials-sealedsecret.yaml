# This is what you commit to Git. It is SAFE to make this repo public —
# the encryptedData values can only be decrypted by the controller's
# private key living inside the cluster. Nobody reading this file,
# including you, can recover the plaintext from it.
#
# DO NOT hand-write the encryptedData block. Generate it with kubeseal
# (see README.md in this folder). The block below is illustrative —
# replace it by running the real sealing command against your cluster.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-credentials
  namespace: asl-dev
spec:
  encryptedData:
    POSTGRES_USER: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEQAx...REPLACE_ME...
    POSTGRES_PASSWORD: AgCA1s7fh2fF9m2kLq8vXpN0zR4tYuI...REPLACE_ME...
  template:
    metadata:
      name: db-credentials
      namespace: asl-dev
    type: Opaque
    # 'data: {}' tells the controller this becomes a normal Secret
    # named db-credentials once decrypted — the backend Deployment
    # references it exactly like any other Kubernetes Secret.
