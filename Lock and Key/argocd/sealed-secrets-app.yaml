# Argo CD Application: deploys the Bitnami Sealed Secrets controller
# into kube-system. This controller holds the private key that decrypts
# SealedSecret objects at apply-time — it's the "key" half of Lock & Key.
#
# Apply once with: kubectl apply -f sealed-secrets-app.yaml
# From then on Argo CD manages upgrades to the controller itself.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.1        # pin a version; check for newer releases before use
    helm:
      values: |
        # Name must match what kubeseal CLI expects by default
        fullnameOverride: sealed-secrets-controller
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
